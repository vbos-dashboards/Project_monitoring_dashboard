<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Project Monitoring</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="cover">
    <img src="./assets/logo.png" alt="Project Monitoring Dashboard Logo" class="logo" />
    <div>
      <h1>Dashboard Page</h1>
      <p>Monitor project completion and overall progress in one view.</p>
    </div>
  </header>

  <main class="container">
    <nav class="panel nav-panel">
      <div class="page-links">
        <a class="page-link" href="./index.html">Home</a>
        <a class="page-link active" href="./dashboard.html">Dashboard</a>
        <a class="page-link" href="./projects.html">Projects Data</a>
      </div>
    </nav>

    <section class="panel controls">
      <label for="sheetSelect">Worksheet</label>
      <select id="sheetSelect"></select>
      <span id="lastUpdated"></span>
    </section>

    <section class="kpi-grid">
      <article class="kpi-card">
        <h2>Total Records</h2>
        <p id="totalProjects">0</p>
      </article>
      <article class="kpi-card">
        <h2>Average Progress</h2>
        <p id="avgProgress">0%</p>
      </article>
      <article class="kpi-card">
        <h2>Completed</h2>
        <p id="completedCount">0</p>
      </article>
    </section>

    <section class="panel">
      <h2>Progress by Project</h2>
      <div id="progressChart" class="bars"></div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
